/* ============================================================
   CRATE CONSOLE
   A dark audio-instrument panel. The waveform is the chrome;
   the found record glows amber when the scanner locks on.
   Type: IBM Plex Mono (the whole voice) + Bricolage Grotesque
   (wordmark + the one big song reveal). One signal colour.
   ============================================================ */

:root {
  --bg:      #0C0D10;   /* warm-neutral near-black: a device, not pure black */
  --surface: #16171B;
  --raise:   #1D1F24;
  --line:    #262830;
  --line-2:  #33353E;
  --text:    #ECECEE;   /* off-white, never #fff */
  --muted:   #8A8C96;
  --faint:   #5C5E68;
  --signal:  #FF7A1A;   /* THE accent: CTA, active waveform, locked LED */
  --signal-press: #E86A0C;
  --on-signal: #140A02;
  --good:    #35C08A;   /* status only */

  --r-slot: 13px;
  --r-card: 15px;
  --r-btn: 9px;
  --r-chip: 6px;

  --enter: cubic-bezier(0.22, 1, 0.36, 1);
  --shell: 40rem;
}

:root[data-theme="light"] {
  --bg:      #F4F5F7;
  --surface: #FFFFFF;
  --raise:   #FFFFFF;
  --line:    #E4E6EC;
  --line-2:  #D3D6DE;
  --text:    #14151A;
  --muted:   #646672;
  --faint:   #9A9CA6;
  --signal:  #E8590C;
  --signal-press: #CC4D06;
  --on-signal: #FFFFFF;
  --good:    #128A5E;
}

/* ---------- reset ---------- */
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "Plex", ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
::selection { background: var(--signal); color: var(--on-signal); }
:focus-visible { outline: 2px solid var(--signal); outline-offset: 3px; border-radius: 4px; }
a { color: inherit; }
button { font-family: inherit; }

.mono { font-variant-numeric: tabular-nums; }

.shell { width: 100%; max-width: var(--shell); margin-inline: auto; padding-inline: 1.25rem; }

.skip {
  position: absolute; left: -9999px; top: 0; z-index: 100;
  background: var(--signal); color: var(--on-signal);
  padding: 0.6rem 1rem; border-radius: var(--r-btn);
}
.skip:focus { left: 0.75rem; top: 0.75rem; }

/* ---------- top bar ---------- */
.bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.05rem 1.25rem;
  max-width: 60rem; margin-inline: auto;
}
.brand { display: flex; align-items: center; gap: 0.55rem; text-decoration: none; color: var(--text); }
.brand svg { width: 22px; height: 22px; display: block; }
.brand-word {
  font-family: "Bric", sans-serif; font-weight: 760;
  font-size: 1.18rem; letter-spacing: -0.01em;
}
.bar-right { display: flex; align-items: center; gap: 0.9rem; }

.led {
  display: inline-flex; align-items: center; gap: 0.45rem;
  font-size: 0.688rem; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
}
.led::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: var(--faint); transition: background 0.25s var(--enter);
}
.led[data-state="scanning"] { color: var(--signal); }
.led[data-state="scanning"]::before { background: var(--signal); animation: pulse 0.9s steps(1,end) infinite; }
.led[data-state="locked"] { color: var(--good); }
.led[data-state="locked"]::before { background: var(--good); box-shadow: 0 0 9px var(--good); }
@keyframes pulse { 0%,55%{opacity:1} 56%,100%{opacity:0.25} }

.icon-btn {
  appearance: none; background: transparent;
  border: 1px solid var(--line-2); border-radius: var(--r-btn);
  color: var(--muted); width: 32px; height: 30px;
  display: grid; place-items: center; cursor: pointer;
  transition: color 0.15s, border-color 0.15s, transform 0.08s;
}
.icon-btn:hover { color: var(--text); border-color: var(--faint); }
.icon-btn:active { transform: scale(0.94); }

/* ---------- stage ---------- */
main { display: flex; flex-direction: column; align-items: center; padding: clamp(1.5rem, 7vh, 5rem) 0 3rem; }
.stage { width: 100%; }

.kicker {
  text-align: center; font-size: 0.719rem; font-weight: 500;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 0.9rem;
}
h1.head {
  text-align: center; font-family: "Bric", sans-serif; font-weight: 680;
  font-size: clamp(1.85rem, 5.4vw, 2.9rem); line-height: 1.02;
  letter-spacing: -0.035em; margin: 0 0 0.55rem; text-wrap: balance;
}
h1.head .glow { color: var(--signal); }
.sub {
  text-align: center; color: var(--muted); font-size: 0.938rem;
  max-width: 30rem; margin: 0 auto clamp(1.6rem, 4vh, 2.4rem); text-wrap: pretty;
}

/* ---------- console: input + waveform ---------- */
.console { border: 1px solid var(--line); background: var(--surface); border-radius: var(--r-card); overflow: hidden; }

.slot { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.5rem 0.5rem 0.9rem; }
.slot-link { color: var(--faint); flex: none; display: block; }
input.field {
  flex: 1; min-width: 0; appearance: none; background: transparent; border: 0;
  color: var(--text); font-family: inherit; font-size: 0.938rem;
  padding: 0.7rem 0; letter-spacing: -0.01em;
}
input.field:focus { outline: none; }
input.field::placeholder { color: var(--faint); }

.btn-go {
  appearance: none; border: 0; cursor: pointer; flex: none;
  background: var(--signal); color: var(--on-signal); border-radius: var(--r-btn);
  padding: 0.68rem 1.15rem; font-weight: 600; font-size: 0.813rem;
  letter-spacing: 0.09em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 0.45rem;
  transition: background 0.15s, transform 0.08s;
}
.btn-go:hover:not(:disabled) { background: var(--signal-press); }
.btn-go:active:not(:disabled) { transform: scale(0.98); }
.btn-go:disabled { opacity: 0.5; cursor: default; }

/* always-present waveform baseline */
.wave-wrap { position: relative; border-top: 1px solid var(--line); background: linear-gradient(180deg, var(--surface), var(--bg)); }
canvas.wave { display: block; width: 100%; height: 90px; position: relative; z-index: 0; }
.wave-wrap::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 30px;
  background: linear-gradient(transparent, var(--bg)); pointer-events: none; z-index: 1;
}
.wave-readout {
  position: absolute; left: 0.85rem; bottom: 0.5rem; z-index: 2;
  font-size: 0.625rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--faint); pointer-events: none;
}
.wave-clock {
  position: absolute; right: 0.85rem; bottom: 0.5rem; z-index: 2;
  font-size: 0.688rem; color: var(--faint);
  font-variant-numeric: tabular-nums; pointer-events: none;
}

/* one example + paste, tiny */
.hint-row {
  display: flex; align-items: center; justify-content: center;
  gap: 0.7rem; flex-wrap: wrap; margin-top: 0.9rem;
  font-size: 0.75rem; color: var(--faint);
}
.try {
  appearance: none; cursor: pointer; background: transparent;
  border: 1px dashed var(--line-2); border-radius: var(--r-chip); color: var(--muted);
  font-family: inherit; font-size: 0.719rem; padding: 0.28rem 0.55rem;
  transition: color 0.15s, border-color 0.15s;
}
.try:hover { color: var(--text); border-color: var(--faint); border-style: solid; }
.paste-btn {
  appearance: none; cursor: pointer; background: transparent; border: 0; color: var(--muted);
  font-family: inherit; font-size: 0.75rem; text-decoration: underline;
  text-underline-offset: 3px; padding: 0;
}
.paste-btn:hover { color: var(--text); }
.hint-row[data-err="1"] { color: var(--signal); }

/* ---------- trace ---------- */
.trace { margin-top: 0.8rem; display: flex; flex-direction: column; gap: 0.15rem; }
.trace:empty { display: none; }
.tline {
  display: flex; gap: 0.6rem; align-items: baseline;
  font-size: 0.719rem; color: var(--muted); animation: rise 0.24s var(--enter) both;
}
.tline .tt { color: var(--faint); flex: none; font-variant-numeric: tabular-nums; }
.tline[data-k="hit"] { color: var(--text); }
.tline[data-k="hit"] .tg { color: var(--good); }
.tline[data-k="miss"] .tg { color: var(--signal); }

    var url = String(raw || "").trim();
    var host = /tiktok\.com/i.test(url) ? "tiktok" : (/instagram\.com/i.test(url) ? "instagram" : null);
    var m = url.match(/(?:video|reel|reels|p)\/([A-Za-z0-9_-]+)/);
    var id = m ? m[1] : url.split(/[?#]/)[0].replace(/\/+$/, "").split("/").pop();
    return { host: host, id: id, url: url };
  }

  /* ---------- tier 01: live oEmbed ---------- */
  function oembedTikTok(url) {
    var api = "https://www.tiktok.com/oembed?url=" + encodeURIComponent(stripQuery(url));
    return fetch(api, { mode: "cors" }).then(function (r) {
      if (!r.ok) throw new Error("http " + r.status);
      return r.json();
    }).then(function (j) {
      if (!j || (!j.title && !j.author_name)) throw new Error("empty");
      return j;
    });
  }
  function creditFrom(json) {
    var html = json.html || "";
    var m = html.match(/>\s*♬\s*([^<]*)</);
    if (m) return m[1].trim();
    m = html.match(/♬\s*([^<"]+)/);
    return m ? m[1].trim() : null;
  }
  var ORIGINAL_WORDS = [
    "original sound", "som original", "sonido original", "son original",
    "originalton", "suono originale", "origineel geluid", "oryginalny dźwięk",
    "sunet original", "оригинальный звук", "оригінальний звук", "orijinal ses",
    "âm thanh gốc", "suara asli", "เสียงต้นฉบับ", "オリジナル楽曲", "オリジナル曲",
    "오리지널 사운드", "原聲", "原声", "原创音乐", "原創音樂", "الصوت الأصلي",
    "मूल ध्वनि", "orihinal na tunog", "původní zvuk", "originalljud",
    "alkuperäinen ääni", "original lyd", "eredeti hang", "αρχικός ήχος",
    "צליל מקורי", "оригинален звук", "sunetul original"
  ];
  function isOriginalSound(credit) {
    if (!credit) return true;
    var segs = credit.trim().toLowerCase().split(/\s+[-–]\s+/);
    for (var i = 0; i < segs.length; i++)
      if (ORIGINAL_WORDS.indexOf(segs[i].trim()) > -1) return true;
    return false;
  }
  function splitCredit(credit) {
    var i = credit.lastIndexOf(" - ");
    if (i < 0) return null;
    var t = credit.slice(0, i).trim(), a = credit.slice(i + 3).trim();
    if (t.length < 2 || !a) return null;
    return { title: t, artist: a };
  }
  function normStr(s) {
    return String(s || "").toLowerCase().replace(/\(.*?\)|\[.*?\]/g, " ").replace(/[^a-z0-9]+/g, " ").trim();
  }
  function byId(id) {
    if (typeof CATALOGUE === "undefined") return null;
    for (var i = 0; i < CATALOGUE.length; i++) if (CATALOGUE[i].id === id) return CATALOGUE[i];
    return null;
  }
  function matchCatalogue(title, artist) {
    if (typeof CATALOGUE === "undefined") return null;
    var nt = normStr(title), na = normStr(artist);
    if (!nt || !na) return null;
    var prefix = null;
    for (var i = 0; i < CATALOGUE.length; i++) {
      var c = CATALOGUE[i];
      if (normStr(c.title) !== nt) continue;
      var ca = normStr(c.artist);
      if (ca === na) return c;
      if (!prefix && (ca.indexOf(na) === 0 || na.indexOf(ca) === 0)) prefix = c;
    }
    return prefix;
  }

  /* ---------- tier 02: the engine ----------
     Engine URL is configurable so a shared link can point at a tunnel:
     ...?engine=https://xxxx.trycloudflare.com  (remembered after first use). */
  var ENGINE = (function () {
    try {
      var q = new URLSearchParams(location.search).get("engine");
      if (q) return q.replace(/\/+$/, "");           // explicit override
    } catch (e) {}
    // the engine serves this very page, so talk to it same-origin. Works both
    // locally (http://127.0.0.1:8788) and shared via a tunnel (https://…).
    if (location.protocol === "http:" || location.protocol === "https:") return "";
    return "http://127.0.0.1:8788";                   // opened as a local file
  })();
  var engineUp = null;
  function checkEngine() {
    if (engineUp !== null) return Promise.resolve(engineUp);
    return fetch(ENGINE + "/health", { mode: "cors" })
      .then(function (r) { return r.ok; })
      .then(function (ok) { engineUp = ok; return ok; })
      .catch(function () { engineUp = false; return false; });
  }
  function engineCall(path, url) {
    return checkEngine().then(function (up) {
      if (!up) return { result: "engine_down" };
      return fetch(ENGINE + path + "?url=" + encodeURIComponent(url), { mode: "cors" })
        .then(function (r) { return r.json(); })
        .catch(function () { engineUp = null; return { result: "engine_down" }; });
    });
  }
  // two-stage: /base names the song in a few seconds, /edits then hunts every version
  // on SoundCloud + YouTube and compares the audio. No reason to make you wait on the
  // slow half to find out what the song is.
  function tier02(url) { return engineCall("/find", url); }
  function tier02Base(url) { return engineCall("/base", url); }
  function tier02Edits(url) { return engineCall("/edits", url); }

  /* ---------- status + clock ---------- */
  function setStatus(text, state) {
    els.led.textContent = text;
    els.led.setAttribute("data-state", state || "idle");
    /* waveTag stays a static label, LED carries the status */
  }
  var t0 = 0, ticker = null;
  function fmt(ms) { return (ms / 1000).toFixed(2) + "s"; }
  function startClock() {
    t0 = performance.now();
    clearInterval(ticker);
    ticker = setInterval(function () { els.clock.textContent = fmt(performance.now() - t0); }, 60);
  }
  function stopClock() { clearInterval(ticker); els.clock.textContent = fmt(performance.now() - t0); }
  function elapsed() { return performance.now() - t0; }

  function trace(tier, text, kind) {
    var row = document.createElement("div");
    row.className = "tline";
    if (kind) row.setAttribute("data-k", kind);
    row.innerHTML = '<span class="tt">' + fmt(elapsed()) + "</span>" +
                    '<span class="tg">' + tier + "</span><span>" + text + "</span>";
    els.trace.appendChild(row);
  }

  /* ---------- waveform ---------- */
  var palette = null;
  function pal() {
    if (palette) return palette;
    palette = {
      line: cssVar("--line-2"), muted: cssVar("--muted"),
      signal: cssVar("--signal"), good: cssVar("--good"), faint: cssVar("--faint")
    };
    return palette;
  }
  var waveState = "idle";     // idle | scanning | locked
  var bars = new Array(72).fill(0.05);
  var scanX = 0;
  var waveRAF = null;

  function waveGeom() {
    var c = els.wave;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = c.clientWidth, h = c.clientHeight;
    if (c.width !== w * dpr || c.height !== h * dpr) { c.width = w * dpr; c.height = h * dpr; }
    var g = c.getContext("2d");
    g.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { g: g, w: w, h: h };
  }

  function drawWave(ts) {
    var geo = waveGeom(), g = geo.g, w = geo.w, h = geo.h, mid = h / 2;
    var p = pal();
    g.clearRect(0, 0, w, h);
    var n = bars.length, gap = w / n, t = (ts || 0) / 1000;

    for (var i = 0; i < n; i++) {
      var target;
      if (waveState === "idle") target = 0.06 + 0.05 * (Math.sin(i * 0.5 + t * 1.6) * 0.5 + 0.5);
      else if (waveState === "scanning") target = 0.12 + 0.68 * Math.abs(Math.sin(i * 0.7 + t * 6)) * (0.4 + 0.6 * Math.random());
      else target = bars[i];
      bars[i] += (target - bars[i]) * (waveState === "locked" ? 0.25 : 0.35);
      var amp = bars[i] * (h * 0.30), x = i * gap + gap / 2;
      var lit = waveState === "scanning" ? x <= scanX : waveState === "locked";
      g.fillStyle = lit ? p.signal : p.line;
      g.globalAlpha = waveState === "idle" ? 0.7 : 1;
      var bw = Math.max(1.5, gap - 2);
      g.fillRect(x - bw / 2, mid - amp, bw, amp * 2);
    }
    g.globalAlpha = 1;

    if (waveState === "scanning") {
      scanX += w / 42; if (scanX > w) scanX = 0;
      g.fillStyle = p.signal;
      g.globalAlpha = 0.9; g.fillRect(scanX, 4, 1.5, h - 8);
      g.globalAlpha = 0.12; g.fillRect(scanX - 26, 4, 26, h - 8);
      g.globalAlpha = 1;
    }
    if (!reduced && waveState !== "locked") waveRAF = requestAnimationFrame(drawWave);
  }
  function setWave(state) {
    waveState = state;
    if (state === "locked") for (var i = 0; i < bars.length; i++) bars[i] = 0.18 + 0.55 * Math.abs(Math.sin(i * 0.9));
    if (waveRAF) cancelAnimationFrame(waveRAF);
    drawWave(performance.now());     // one guaranteed paint even if rAF is throttled
    if (!reduced && state !== "locked") waveRAF = requestAnimationFrame(drawWave);
  }

  /* ---------- the run ----------
     The engine is authoritative: it hears the audio, names the BASE song, and
     searches SoundCloud + YouTube for the EXACT edit. TikTok's oEmbed only gives
     us the clip preview + a credit to show while that runs. When the engine is
     off we fall back to the credit (TikTok) or say it's needed (Instagram). */
  async function run(rawUrl) {
    if (busy) return;
    var parsed = parseLink(rawUrl);
    els.trace.innerHTML = "";
    els.resultWrap.hidden = true;
    els.resultWrap.innerHTML = "";
    startClock();

    if (!parsed.host) {
      stopClock(); setStatus("Bad link", "idle");
      trace("ERR", "Paste a TikTok or Instagram link.", "miss");
      setWave("idle"); return;
    }

    busy = true; els.go.disabled = true;
    setStatus("Reading", "scanning"); setWave("scanning");

    // clip preview: TikTok has a browser oEmbed, Instagram doesn't
    var oe = null;
    if (parsed.host === "tiktok") {
      trace("T01", "reading the clip &middot; no key, $0");
      try { oe = await oembedTikTok(parsed.url); } catch (e) { oe = null; }
      if (oe) trace("T01", 'credit: "<b>' + esc(creditFrom(oe) || "none") + '</b>"');
    } else {
      trace("IG", "reading the reel &middot; via your login");
    }

    // the engine does the real work for both platforms.
    // STAGE 1 - name the song (fast). STAGE 2 - find which upload it actually is (slow).
    setStatus("Listening", "scanning");
    trace("T02", "listening &middot; naming the song");
    var deep = await tier02Base(parsed.url);
    if (deep && deep.result === "found" && deep.edits_pending) {
      // show the song NOW, then keep working
      trace("T02", "song: <b>" + esc(deep.base_song || "") + "</b>" +
            (deep.base_artist ? " &middot; " + esc(deep.base_artist) : "") +
            " &middot; in <b>" + deep.secs + "s</b>", "hit");
      setStatus("Found the song", "locked"); setWave("locked");
      renderDeep(oe, deep, parsed);
      trace("T03", "now finding the exact version &middot; soundcloud + youtube");
      setStatus("Finding version", "scanning");
      var full = await tier02Edits(parsed.url);
      if (full && full.result && full.result !== "engine_down") deep = full;
    }
    stopClock();

    if (deep && deep.result === "found") {
      setStatus("Found it", "locked"); setWave("locked");
      trace("T02", "got it in <b>" + deep.secs + "s</b>" +
            (deep.candidates && deep.candidates.length ? " &middot; " + deep.candidates.length + " matching uploads" : ""), "hit");
      renderDeep(oe, deep, parsed);
    } else if (deep && deep.result === "rate_limited") {
      setStatus("TikTok busy", "idle"); setWave("idle");
      trace("T02", "TikTok throttled the audio fetch", "miss");
      renderDead(oe, deep, parsed, "TikTok is rate-limiting audio right now (too many pulls from this network). The credit above is from TikTok's embed. Wait a minute and hit Identify again - it usually clears fast.");
    } else if (deep && deep.result === "no_match") {
      setStatus("No song", "idle"); setWave("idle");
      trace("T02", "listened to all of it, no track. Likely genuine original audio.", "miss");
      renderDead(oe, deep, parsed, "Listened through the whole clip and matched it against Shazam, SoundCloud and YouTube. No track. This one's most likely genuine original audio, not a song.");
    } else if (deep && deep.result === "error") {
      setStatus("Engine error", "idle"); setWave("idle");
      renderDead(oe, deep, parsed, esc((deep.error || "The engine hit an error.")));
    } else {
      // engine off / unreachable (deep is null or result === "engine_down")
      if (parsed.host === "tiktok" && oe) {
        var credit = creditFrom(oe);
        var parts = isOriginalSound(credit) ? null : splitCredit(credit);
        if (parts) {
          setStatus("From credit", "locked"); setWave("locked");
          trace("T01", "engine off &middot; naming from the credit only", "miss");
          renderResolved(oe, parts, matchCatalogue(parts.title, parts.artist));
        } else {
          setStatus("Start Crate", "idle"); setWave("idle");
          trace("T02", "engine not reachable", "miss");
          renderDead(oe, { credit: credit }, parsed, "The Crate engine isn't running. Double-click <b>Crate.command</b> to start it, then paste again. It runs on your Mac and does the actual listening (a browser can't touch the audio on its own).");
        }
      } else {
        setStatus("Start Crate", "idle"); setWave("idle");
        trace("T02", "engine not reachable", "miss");
        renderDead(oe, { credit: null }, parsed, "The Crate engine isn't running. Double-click <b>Crate.command</b> to start it, then paste the reel again. Instagram is read through your own login, so the engine has to run on your Mac.");
      }
    }
    busy = false; els.go.disabled = false;
  }

  /* ---------- render ---------- */
  function srcStrip(data) {
    var thumb = data.thumbnail_url
      ? '<img src="' + esc(data.thumbnail_url) + '" alt="" loading="eager" onerror="this.style.visibility=\'hidden\'">'
      : '<div class="noimg"></div>';
    return '<div class="src">' + thumb +
      '<div class="src-meta"><div class="src-t">' + esc((data.title || "Untitled").slice(0, 90)) + "</div>" +
      '<div class="src-a">@' + esc(data.author_unique_id || data.author_name || "") + "</div></div></div>";
  }
  function searchUrl(svc, t) {
    var q = encodeURIComponent(((t.artist || "") + " " + (t.title || "")).trim());
    if (svc === "spotify") return "https://open.spotify.com/search/" + q;
    if (svc === "apple") return "https://music.apple.com/search?term=" + q;
    return "https://music.youtube.com/search?q=" + q;
  }
  function outLinks(t) {
    return '<a class="out" href="' + searchUrl("spotify", t) + '" target="_blank" rel="noopener noreferrer">Spotify</a>' +
           '<a class="out" href="' + searchUrl("apple", t) + '" target="_blank" rel="noopener noreferrer">Apple</a>' +
           '<a class="out" href="' + searchUrl("yt", t) + '" target="_blank" rel="noopener noreferrer">YT</a>';
  }
  function hueFor(artist) {
    var h = 2166136261, s = String(artist || "").toLowerCase();
    for (var i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = (h * 16777619) >>> 0; }
    return (h % 360);
  }
  function artFor(known, artist, art) {
    if (art) return '<img class="art" src="' + esc(art) + '" alt="" loading="eager" onerror="this.style.visibility=\'hidden\'">';
    var hue = (known && known.hue != null) ? known.hue : hueFor(artist);
    return '<canvas class="art art-disc" data-hue="' + hue + '"></canvas>';
  }

  function renderResolved(data, parts, known) {
    var t = { title: parts.title, artist: parts.artist };
    var chips = "";
    if (known && known.year) chips += '<span class="chip"><b>' + known.year + "</b></span>";
    if (known && known.bpm) chips += '<span class="chip"><b>' + known.bpm + "</b> BPM</span>";
    if (known && known.key) chips += '<span class="chip"><b>' + esc(known.key) + "</b></span>";
    var body =
      '<div class="record">' + artFor(known, parts.artist, null) +
        '<div class="rec-meta">' +
          '<div class="tag-lock" data-src="oembed">&#9834; From the credit</div>' +
          '<div class="rec-title">' + esc(parts.title) + "</div>" +
          '<div class="rec-artist">' + esc(parts.artist) + "</div>" +
        "</div></div>" +
      (chips ? '<div class="edit-strip"><div class="chips">' + chips + "</div></div>" : "") +
      '<div class="acts">' +
        (known ? '<button class="save" id="saveBtn" type="button">Save</button>' : "") +
        '<div style="flex:1;display:flex;gap:0.4rem">' + outLinks(t) + "</div></div>";
    card(data, body, known ? { id: known.id, via: "Credit" } : null);
  }

  // build an oEmbed-shaped object from the engine data (Instagram has no oEmbed)
  function sourceOf(oe, deep, parsed) {
    if (oe) return oe;
    return {
      thumbnail_url: (deep && deep.thumb) || null,
      title: (deep && (deep.desc || deep.credit)) || "",
      author_unique_id: (deep && deep.handle) || (parsed && parsed.host === "instagram" ? "instagram" : "")
    };
  }
  function srcBadge(source) {
    var label = source === "soundcloud" ? "SoundCloud" : source === "youtube" ? "YouTube" : source;
    return '<span class="badge badge-' + esc(source) + '">' + esc(label) + "</span>";
  }
  function fmtPlays(n) {
    n = +n || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(n >= 1e7 ? 0 : 1).replace(/\.0$/, "") + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(n >= 1e4 ? 0 : 1).replace(/\.0$/, "") + "K";
    return String(n);
  }
  function candRow(c, top) {
    var meta = esc(c.uploader || "");
    if (c.plays) meta += (meta ? " &middot; " : "") + fmtPlays(c.plays) + " plays";
    return '<a class="cand' + (top ? " cand-top" : "") + '" href="' + esc(c.url) + '" target="_blank" rel="noopener noreferrer">' +
      srcBadge(c.source) +
      '<span class="cand-t">' + esc(c.title) + "</span>" +
      '<span class="cand-u">' + meta + "</span>" +
      '<span class="cand-open">Open &#8599;</span>' +
    "</a>";
  }

  function commentBlock(deep) {
    if (!deep.comment_hints || !deep.comment_hints.length) return "";
    return '<div class="edit-strip"><div class="edit-label">From the comments</div>' +
      deep.comment_hints.map(function (h) {
        return '<div class="cmt-line">&ldquo;' + esc(h) + "&rdquo;</div>";
      }).join("") + "</div>";
  }

  function renderDeep(oe, deep, parsed) {
    var data = sourceOf(oe, deep, parsed);
    var base = { title: deep.base_song, artist: deep.base_artist };
    var known = deep.base_song ? matchCatalogue(deep.base_song, deep.base_artist) : null;
    var exact = deep.exact || null;
    var cands = deep.candidates || [];
    // the exact upload is "distinct" when it isn't just the plain master again
    var distinct = exact && normStr(exact.title) !== normStr(deep.base_song);

    var multiSong = deep.songs && deep.songs.length > 1;
    var head =
      '<div class="record">' + artFor(known, deep.base_artist, deep.art) +
        '<div class="rec-meta">' +
          '<div class="tag-lock">&#9679; ' + (multiSong ? deep.songs.length + " songs in this clip" : "Heard the audio") + "</div>" +
          '<div class="rec-title">' + esc(deep.base_song || (exact ? exact.title : "Unknown")) + "</div>" +
          '<div class="rec-artist">' + esc(deep.base_artist || "") + "</div>" +
        "</div></div>";

    // a clip can layer/sequence two tracks - list them all with timestamps
    var songsBlock = "";
    if (multiSong) {
      songsBlock = '<div class="edit-strip"><div class="edit-label">Every song in this clip</div><div class="cand-list">' +
        deep.songs.map(function (s, i) {
          var t = { title: s.song, artist: s.artist };
          return '<div class="song-line">' +
            '<span class="song-idx">' + (i + 1) + "</span>" +
            '<span class="song-txt"><span class="song-t">' + esc(s.song) + "</span>" +
            '<span class="song-a">' + esc(s.artist || "") + (s.at != null ? " &middot; " + s.at + "s in" : "") + "</span></span>" +
            '<span class="song-links">' +
              '<a href="' + searchUrl("spotify", t) + '" target="_blank" rel="noopener noreferrer">Spotify</a>' +
              '<a href="' + searchUrl("yt", t) + '" target="_blank" rel="noopener noreferrer">YT</a>' +
              (s.shazam ? '<a href="' + esc(s.shazam) + '" target="_blank" rel="noopener noreferrer">Shazam</a>' : "") +
            "</span></div>";
        }).join("") + "</div></div>";
    }

    // honest label: only crown ONE upload as the exact edit when we're certain
    // it's an edit AND one upload clearly wins. When several match near-equally,
    // show the spread and say it's one of these.
    var certain = !!deep.edit_certain;
    var decisive = !!deep.decisive;
    var speed = deep.speed && deep.speed !== "as posted" ? deep.speed : null;
    var editBlock = "";
    if (exact) {
      var heading = (certain && decisive) ? "The exact edit playing"
                  : certain ? "The edit &middot; it's one of these"
                  : "Closest match &middot; SoundCloud / YouTube";
      editBlock =
        '<div class="edit-strip">' +
          (speed ? '<div class="edit-verdict"><b>' + esc(speed.charAt(0).toUpperCase() + speed.slice(1)) + "</b> &middot; counter-matched to name it</div>" : "") +
          '<div class="edit-label">' + heading + "</div>" +
          '<div class="exact-hit">' + candRow(exact, true) + "</div>" +
          (cands.length > 1 ?
            '<div class="cand-label">' + (decisive ? "Other uploads of this edit" : "Other versions it could be") + "</div>" +
            '<div class="cand-list">' +
              cands.slice(1, 6).map(function (c) { return candRow(c, false); }).join("") +
            "</div>" : "") +
          '<div class="cand-note">Matched to the audio in your clip, then ranked by plays - the version people actually use.</div>' +
        "</div>";
    } else if (deep.base_song) {
      editBlock =
        '<div class="edit-strip">' +
          '<div class="edit-verdict" data-v="original"><b>' +
            (speed ? esc(speed.charAt(0).toUpperCase() + speed.slice(1)) : "Used as-is") +
            "</b> &middot; " + (speed ? "matched to the original recording" : "this is the original track, no edit") + "</div>" +
        "</div>";
    }

    var body = head + songsBlock + editBlock + commentBlock(deep) +
      '<div class="acts">' +
        (known ? '<button class="save" id="saveBtn" type="button">Save</button>' : "") +
        '<div style="flex:1;display:flex;gap:0.4rem;flex-wrap:wrap">' + outLinks(base) +
        (deep.shazam ? '<a class="out" href="' + esc(deep.shazam) + '" target="_blank" rel="noopener noreferrer">Shazam</a>' : "") +
        "</div></div>";
    card(data, body, known ? { id: known.id, via: "Heard" } : null);
  }

  function renderDead(oe, deep, parsed, msg) {
    var data = sourceOf(oe, deep, parsed);
    var credit = deep && deep.credit;
    var body =
      '<div class="deadend">' +
        '<div class="tag-lock" data-src="oembed" style="color:var(--signal)">&#9834; ' +
          (parsed && parsed.host === "instagram" ? "Instagram reel" : "Original sound") + "</div>" +
        '<div class="rec-title">' + esc(credit || "original sound") + "</div>" +
        "<p>" + msg + "</p>" +
      "</div>" + commentBlock(deep || {});
    card(data, body, null);
  }

  function card(data, body, saveRec) {
    els.resultWrap.hidden = false;
    els.resultWrap.innerHTML = '<div class="card">' + srcStrip(data) + body + "</div>";
    paintDiscs();
    var save = $("#saveBtn");
    if (save && saveRec) {
      var id = saveRec.id;
      if (getCrate().some(function (r) { return r.id === id; })) { save.textContent = "Saved"; save.setAttribute("data-saved", "1"); }
      save.addEventListener("click", function () {
        var crate = getCrate();
        if (crate.some(function (r) { return r.id === id; })) return;
        crate.unshift({ id: id, via: saveRec.via });
        setCrate(crate); save.textContent = "Saved"; save.setAttribute("data-saved", "1"); renderCrate();
      });
    }
  }

  /* record-label disc when there's no album art */
  function paintDiscs() {
    els.resultWrap.querySelectorAll("canvas.art-disc").forEach(function (c) { paintDisc(c, +c.getAttribute("data-hue"), 78); });
  }
  function paintCrateArt() {
    els.crateBody.querySelectorAll("canvas.crate-art").forEach(function (c) { paintDisc(c, +c.getAttribute("data-hue"), 30); });
    paintDiscs();
  }
  function paintDisc(canvas, hue, size) {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var s = canvas.clientWidth || size;
    if (!s) return;
    canvas.width = s * dpr; canvas.height = s * dpr;
    var g = canvas.getContext("2d"); g.setTransform(dpr, 0, 0, dpr, 0, 0);
    var c = s / 2, dark = isDark();
    g.fillStyle = dark ? "#0d0c0a" : "#131210";
    g.beginPath(); g.arc(c, c, c, 0, 7); g.fill();
    g.fillStyle = "hsl(" + hue + " 55% " + (dark ? "56%" : "48%") + ")";
    g.beginPath(); g.arc(c, c, c * 0.6, 0, 7); g.fill();
    g.strokeStyle = "rgba(255,255,255,0.09)"; g.lineWidth = 0.5;
    for (var r = c * 0.66; r < c * 0.98; r += Math.max(1.6, s / 42)) { g.beginPath(); g.arc(c, c, r, 0, 7); g.stroke(); }
    g.fillStyle = dark ? "#16171B" : "#F4F5F7";
    g.beginPath(); g.arc(c, c, Math.max(2, c * 0.08), 0, 7); g.fill();
  }

  /* ---------- crate store ---------- */
  function getCrate() {
    try { var v = JSON.parse(localStorage.getItem("crate.records") || "[]"); return Array.isArray(v) ? v.filter(function (r) { return r && byId(r.id); }) : []; }
    catch (e) { return []; }
  }
  function setCrate(v) { try { localStorage.setItem("crate.records", JSON.stringify(v)); } catch (e) {} }

  function renderCrate() {
    var crate = getCrate();
    els.crateTools.hidden = crate.length === 0;
    if (!crate.length) {
      els.crateBody.innerHTML = '<div class="crate-empty">Nothing saved yet. Find a song and hit Save.</div>';
      return;
    }
    var html = '<ul class="crate-list">';
    crate.forEach(function (rec, i) {
      var t = byId(rec.id);
      html += '<li class="crate-row" style="animation-delay:' + Math.min(i * 30, 300) + 'ms">' +
        '<span class="crate-n">' + String(i + 1).padStart(2, "0") + "</span>" +
        '<canvas class="crate-art" data-hue="' + (t.hue != null ? t.hue : hueFor(t.artist)) + '"></canvas>' +
        '<span class="crate-txt"><span class="crate-t">' + esc(t.title) + "</span>" +
        '<span class="crate-a">' + esc(t.artist) + "</span></span>" +
        '<button class="crate-x" type="button" data-rm="' + t.id + '" aria-label="Remove ' + esc(t.title) + '">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg></button></li>';
    });
    els.crateBody.innerHTML = html + "</ul>";
    paintCrateArt();
    els.crateBody.querySelectorAll("[data-rm]").forEach(function (b) {
      b.addEventListener("click", function () {
        setCrate(getCrate().filter(function (r) { return r.id !== b.getAttribute("data-rm"); }));
        renderCrate();
      });
    });
  }
  els.exportBtn.addEventListener("click", function () {
    var out = getCrate().map(function (r) {
      var t = byId(r.id);
      var o = { title: t.title, artist: t.artist, year: t.year, via: r.via };
      if (t.bpm) o.bpm = t.bpm; if (t.key) o.key = t.key;
      return o;
    });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(out, null, 2)], { type: "application/json" }));
    a.download = "crate.json"; a.click(); URL.revokeObjectURL(a.href);
    els.exportBtn.textContent = "Exported"; setTimeout(function () { els.exportBtn.textContent = "Export"; }, 1500);
  });
  els.clearBtn.addEventListener("click", function () { setCrate([]); renderCrate(); });

  /* ---------- paste + example + share ---------- */
  els.paste.addEventListener("click", async function () {
    if (busy) return;
    if (!navigator.clipboard || !navigator.clipboard.readText) { els.input.focus(); return; }
    try {
      var txt = (await navigator.clipboard.readText() || "").trim();
      if (!txt) { els.input.focus(); return; }
      els.input.value = txt; run(txt);
    } catch (e) { els.input.focus(); }
  });
  els.tryBtn.addEventListener("click", function () { els.input.value = EXAMPLE; run(EXAMPLE); });
  els.form.addEventListener("submit", function (e) {
    e.preventDefault();
    var v = els.input.value.trim();
    if (!v) { els.input.focus(); return; }
    run(v);
  });
  (function fromShare() {
    var q = new URLSearchParams(window.location.search);
    var shared = (q.get("url") || q.get("text") || q.get("u") || "").trim();
    if (!shared) return;
    var m = shared.match(/https?:\/\/\S+/);
    if (m) shared = m[0];
    els.input.value = shared; run(shared);
  })();

  window.addEventListener("resize", function () { palette = null; setWave(waveState); paintCrateArt(); });
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
    if (!document.documentElement.getAttribute("data-theme")) { palette = null; setWave(waveState); paintCrateArt(); }
  });

  if (typeof CATALOGUE !== "undefined") els.footStat.innerHTML = "Prototype &middot; " + CATALOGUE.length + " tracks known";
  renderCrate();
  setWave("idle");
})();

</script>
